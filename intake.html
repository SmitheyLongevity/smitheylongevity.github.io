<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Intake — Smithey Longevity Group</title>
<style>
  :root{ --green:#1E4D3C; --rust:#B05A2E; --ink:#18170F; --grey:#54513F; --cream:#F6F2E9; }
  html,body{height:100%;margin:0;}
  body{ background:var(--cream); color:var(--ink); display:flex; align-items:center; justify-content:center;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
  .card{ max-width:460px; text-align:center; padding:44px 28px; }
  .brand{ color:var(--rust); font-weight:700; letter-spacing:.04em; font-size:13px; text-transform:uppercase; margin-bottom:12px; }
  h1{ color:var(--green); font-size:27px; margin:0 0 14px; }
  p{ color:var(--grey); font-size:16px; line-height:1.65; margin:0 0 26px; }
  a.btn{ display:inline-block; background:var(--green); color:#fff; text-decoration:none;
         padding:13px 26px; border-radius:8px; font-weight:600; font-size:16px; }
  a.btn:hover{ background:#163b2e; }
  .note{ font-size:13px; color:var(--grey); margin-top:20px; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Smithey Longevity Group</div>
    <h1>Welcome to your intake</h1>
    <p>This is your private, secure intake form. It takes about 10 to 15 minutes, and there are no wrong answers. The more honest and detailed you are, the better the read I can give you.</p>
    <a class="btn" href="https://forms.gle/nkZuw21F6PxSKnqt6">Begin the form</a>
    <div class="note">Private and educational. Not medical advice.</div>
  </div>
</body>
</html>
